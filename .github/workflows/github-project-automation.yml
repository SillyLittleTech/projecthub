name: github-project-automation

on:
  issues:
    types:
      - closed

permissions:
  contents: read
  issues: read
  projects: write

jobs:
  update-status-for-administrative-issues:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.state_reason == 'completed' || github.event.issue.state_reason == 'not_planned' }}
    steps:
      - name: Set project status to CCC/NCC for administrative issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = (context.payload.issue.labels || []).map((label) => label.name.toLowerCase());
            if (!labels.includes('administrative')) {
              core.info('Issue is not labeled administrative; skipping.');
              return;
            }

            const stateReason = context.payload.issue.state_reason;
            const targetStatus = stateReason === 'completed'
              ? 'CCC'
              : stateReason === 'not_planned'
                ? 'NCC'
                : null;

            if (!targetStatus) {
              core.info(`Unsupported state reason: ${stateReason}; skipping.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;

            const query = `
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    projectItems(first: 20) {
                      nodes {
                        id
                        project {
                          id
                          fields(first: 50) {
                            nodes {
                              ... on ProjectV2SingleSelectField {
                                id
                                name
                                options {
                                  id
                                  name
                                }
                              }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query, { owner, repo, issueNumber });
            const items = result.repository.issue.projectItems.nodes;

            if (!items.length) {
              core.info('Issue is not in any projects; nothing to update.');
              return;
            }

            let updated = 0;

            for (const item of items) {
              const projectId = item.project.id;
              const statusField = item.project.fields.nodes.find((field) => field.name === 'Status');

              if (!statusField) {
                core.info(`Project ${projectId} has no Status field; skipping item ${item.id}.`);
                continue;
              }

              const option = statusField.options.find((opt) => opt.name === targetStatus);
              if (!option) {
                core.info(`Project ${projectId} Status field has no '${targetStatus}' option; skipping item ${item.id}.`);
                continue;
              }

              await github.graphql(
                `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `,
                {
                  projectId,
                  itemId: item.id,
                  fieldId: statusField.id,
                  optionId: option.id,
                },
              );

              updated += 1;
            }

            core.info(`Updated ${updated} project item(s) to status '${targetStatus}'.`);

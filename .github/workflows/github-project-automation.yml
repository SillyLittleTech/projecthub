name: github-project-automation

on:
  issues:
    types:
      - closed

permissions:
  contents: read
  issues: read
  projects: write

jobs:
  update-status-for-administrative-issues:
    runs-on: ubuntu-latest
    if: ${{ github.event.issue.state_reason == 'completed' || github.event.issue.state_reason == 'not_planned' }}
    steps:
      - name: Set project status to CCC/NCC for administrative issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const labels = (context.payload.issue.labels || []).map((label) => label.name.toLowerCase());
            if (!labels.includes('administrative')) {
              core.info('Issue is not labeled administrative; skipping.');
              return;
            }

            const stateReason = context.payload.issue.state_reason;
            const targetStatus = stateReason === 'completed'
              ? 'CCC'
              : stateReason === 'not_planned'
                ? 'NCC'
                : null;

            if (!targetStatus) {
              core.info(`Unsupported state reason: ${stateReason}; skipping.`);
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issueNumber = context.payload.issue.number;

            const items = [];
            let itemCursor = null;
            let hasNextItemPage = true;

            while (hasNextItemPage) {
              const itemsResult = await github.graphql(
                `
                  query($owner: String!, $repo: String!, $issueNumber: Int!, $itemCursor: String) {
                    repository(owner: $owner, name: $repo) {
                      issue(number: $issueNumber) {
                        projectItems(first: 100, after: $itemCursor) {
                          nodes {
                            id
                            project {
                              id
                            }
                          }
                          pageInfo {
                            hasNextPage
                            endCursor
                          }
                        }
                      }
                    }
                  }
                `,
                { owner, repo, issueNumber, itemCursor },
              );

              const page = itemsResult.repository.issue.projectItems;
              items.push(...page.nodes);
              hasNextItemPage = page.pageInfo.hasNextPage;
              itemCursor = page.pageInfo.endCursor;
            }

            if (!items.length) {
              core.info('Issue is not in any projects; nothing to update.');
              return;
            }

            const statusFieldCache = new Map();
            let updated = 0;

            for (const item of items) {
              const projectId = item.project.id;
              let statusField = statusFieldCache.get(projectId);

              if (statusField === undefined) {
                let fieldCursor = null;
                let hasNextFieldPage = true;
                statusField = null;

                while (hasNextFieldPage && !statusField) {
                  const fieldsResult = await github.graphql(
                    `
                      query($projectId: ID!, $fieldCursor: String) {
                        node(id: $projectId) {
                          ... on ProjectV2 {
                            fields(first: 100, after: $fieldCursor) {
                              nodes {
                                ... on ProjectV2SingleSelectField {
                                  id
                                  name
                                  options {
                                    id
                                    name
                                  }
                                }
                              }
                              pageInfo {
                                hasNextPage
                                endCursor
                              }
                            }
                          }
                        }
                      }
                    `,
                    { projectId, fieldCursor },
                  );

                  const fieldPage = fieldsResult.node?.fields;
                  if (!fieldPage) {
                    core.info(`Project ${projectId} fields could not be read; skipping item ${item.id}.`);
                    break;
                  }
                  statusField = fieldPage.nodes.find((field) => field.name === 'Status') || null;
                  hasNextFieldPage = fieldPage.pageInfo.hasNextPage;
                  fieldCursor = fieldPage.pageInfo.endCursor;
                }

                statusFieldCache.set(projectId, statusField);
              }

              if (!statusField) {
                core.info(`Project ${projectId} has no Status field; skipping item ${item.id}.`);
                continue;
              }

              const option = statusField.options.find((opt) => opt.name === targetStatus);
              if (!option) {
                core.info(`Project ${projectId} Status field has no '${targetStatus}' option; skipping item ${item.id}.`);
                continue;
              }

              await github.graphql(
                `
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(
                      input: {
                        projectId: $projectId
                        itemId: $itemId
                        fieldId: $fieldId
                        value: { singleSelectOptionId: $optionId }
                      }
                    ) {
                      projectV2Item {
                        id
                      }
                    }
                  }
                `,
                {
                  projectId,
                  itemId: item.id,
                  fieldId: statusField.id,
                  optionId: option.id,
                },
              );

              updated += 1;
            }

            core.info(`Updated ${updated} project item(s) to status '${targetStatus}'.`);
